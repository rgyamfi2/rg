<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>London Drive — Free Roam</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%95%3C/text%3E%3C/svg%3E" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e14; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
  /* cinematic vignette over the 3D view, under the HUD */
  #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background: radial-gradient(ellipse 82% 78% at 50% 44%, rgba(0,0,0,0) 66%, rgba(8,10,16,0.30) 100%); }

  /* HUD */
  #hud { position: fixed; inset: 0; pointer-events: none; color: #fff; }
  .panel {
    position: absolute; background: rgba(12,16,24,0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
  }
  #speedo { right: 20px; bottom: 20px; width: 168px; height: 96px; padding: 12px 16px; text-align: right; }
  #speedo .val { font-size: 46px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
  #speedo .unit { font-size: 13px; opacity: .7; letter-spacing: 2px; }
  #speedo .gear { position:absolute; left:16px; bottom:14px; font-size:13px; opacity:.65; letter-spacing:1px;}

  /* Damage / bodywork meter (bottom-right, above the speedo) */
  #dmgwrap { right: 20px; bottom: 128px; width: 168px; padding: 9px 14px; }
  #dmgwrap .dl { font-size: 10px; letter-spacing: 2px; opacity: .7; margin-bottom: 6px; }
  #dmgwrap .dbar { height: 8px; border-radius: 5px; background: rgba(255,255,255,.14); overflow: hidden; }
  #dmgwrap .dfill { height: 100%; width: 100%; border-radius: 5px;
    background: linear-gradient(90deg, #34d17a, #ffd166 55%, #ff4d3d);
    transform-origin: left; transition: transform .18s ease; }

  #place { left: 50%; top: 22px; transform: translateX(-50%); padding: 9px 22px; font-size: 15px; letter-spacing: .5px; opacity: 0; transition: opacity .4s; text-align:center;}
  #place.show { opacity: 1; }

  #help { left: 20px; bottom: 20px; padding: 12px 16px; font-size: 12.5px; line-height: 1.7; opacity: .9; max-width: 240px;}
  #help kbd { background: rgba(255,255,255,.14); border-radius: 4px; padding: 1px 6px; font-family: inherit; font-weight:700; font-size:11px;}
  #help .t { font-weight: 700; letter-spacing: 1px; opacity:.7; font-size: 11px; margin-bottom: 6px; text-transform: uppercase;}

  /* Minimap — small by default, tap/click to expand */
  #minimap { right: 20px; top: 20px; width: 96px; height: 96px; padding: 6px;
    pointer-events: auto; cursor: pointer; transition: width .28s cubic-bezier(.2,.8,.2,1), height .28s cubic-bezier(.2,.8,.2,1), padding .28s; }
  #minimap.big { width: 260px; height: 260px; padding: 9px; }
  #minimap canvas { width: 100%; height: 100%; border-radius: 8px; display: block; }
  #minimap .mm-tag { position: absolute; left: 0; right: 0; bottom: -17px; text-align: center;
    font-size: 9.5px; letter-spacing: 1.5px; opacity: .55; text-transform: uppercase; pointer-events: none; }

  /* Loading */
  #load { position: fixed; inset: 0; background: #0b0e14; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; transition: opacity .8s; }
  #load h1 { color: #fff; font-size: 40px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
  #load h1 span { color: #e63946; }
  #load p { color: #8a94a6; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 26px;}
  #load .bar { width: 240px; height: 4px; background: rgba(255,255,255,.1); border-radius: 4px; overflow: hidden;}
  #load .fill { height: 100%; width: 30%; background: linear-gradient(90deg,#e63946,#ffd166); border-radius:4px; transition: width .3s;}
  #load small { color:#5a6474; margin-top:20px; font-size:12px;}

  /* Mobile controls */
  #touch { position: fixed; inset: 0; pointer-events: none; display: none; z-index: 20; }
  .tbtn { pointer-events: auto; user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; transition: transform .06s ease, filter .06s ease; }
  .tbtn:active { transform: scale(0.94); filter: brightness(1.25); }

  /* Steering rocker, bottom-left */
  #steer { position: absolute; left: 20px; bottom: 26px; display: flex; gap: 10px; }
  .tbtn.steer { width: 84px; height: 96px; border-radius: 20px;
    background: linear-gradient(180deg, rgba(60,72,92,.72), rgba(30,38,52,.72));
    border: 1.5px solid rgba(255,255,255,.30); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    font-size: 40px; box-shadow: 0 6px 18px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.18); }

  /* Pedals, bottom-right */
  #pedals { position: absolute; right: 20px; bottom: 26px; display: flex; gap: 12px; align-items: flex-end; }
  .tbtn.pedal { width: 82px; height: 150px; border-radius: 22px; flex-direction: column; gap: 6px;
    border: 1.5px solid rgba(255,255,255,.28); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 8px 22px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,255,255,.22); }
  .tbtn.pedal .ico { font-size: 34px; line-height: 1; }
  .tbtn.pedal .lbl { font-size: 12px; letter-spacing: 2px; opacity: .92; }
  #t-gas   { background: linear-gradient(180deg, #2ec36b, #14964a); }
  #t-brake { background: linear-gradient(180deg, #ff5a52, #d5271e); height: 118px; }

  @media (hover: none) and (pointer: coarse) { #touch { display: block; } #help { display: none; } }
  /* let people force-show controls with ?touch=1 for testing */
  #touch.force { display: block; }
</style>
</head>
<body>
<div id="app"></div>
<div id="vignette"></div>

<div id="hud">
  <div id="minimap" class="panel"><canvas id="mm" width="360" height="360"></canvas><div class="mm-tag" id="mmTag">tap to expand</div></div>
  <div id="place" class="panel"></div>
  <div id="speedo" class="panel">
    <div class="val" id="spd">0</div><div class="unit">MPH</div>
    <div class="gear" id="gear">D</div>
  </div>
  <div id="dmgwrap" class="panel"><div class="dl">BODYWORK</div><div class="dbar"><div class="dfill" id="dfill"></div></div></div>
  <div id="help" class="panel">
    <div class="t">London Drive</div>
    <div><kbd>W</kbd>/<kbd>↑</kbd> accelerate &nbsp; <kbd>S</kbd>/<kbd>↓</kbd> brake/reverse</div>
    <div><kbd>A</kbd><kbd>D</kbd>/<kbd>←</kbd><kbd>→</kbd> steer &nbsp; <kbd>Space</kbd> handbrake</div>
    <div><kbd>C</kbd> camera &nbsp; <kbd>H</kbd> horn &nbsp; <kbd>R</kbd> reset</div>
  </div>
</div>

<div id="touch">
  <div id="steer">
    <div class="tbtn steer" id="t-left">‹</div>
    <div class="tbtn steer" id="t-right">›</div>
  </div>
  <div id="pedals">
    <div class="tbtn pedal" id="t-brake"><span class="ico">▾</span><span class="lbl">BRAKE</span></div>
    <div class="tbtn pedal" id="t-gas"><span class="ico">▴</span><span class="lbl">GO</span></div>
  </div>
</div>

<div id="load">
  <h1>LONDON <span>DRIVE</span></h1>
  <p>Free Roam</p>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <small id="lmsg">Building the city…</small>
</div>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   LONDON DRIVE — a free-roam driving game in a stylised London
   Single-file Three.js scene. Arcade handling, dynamic camera,
   landmarks, traffic, pedestrians, minimap, day sky.
   ============================================================ */

const loadEl = document.getElementById('load');
const fillEl = document.getElementById('fill');
const lmsg   = document.getElementById('lmsg');
const setLoad = (p, m) => { fillEl.style.width = Math.min(100,p*100)+'%'; if(m) lmsg.textContent = m; };

// ---------- Renderer ----------
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.18;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('app').appendChild(renderer.domElement);

// ---------- Scene / sky / fog ----------
const scene = new THREE.Scene();
const skyTop = new THREE.Color(0x6ea8dc), skyBot = new THREE.Color(0xcfe0ec);
scene.background = skyBot.clone();
scene.fog = new THREE.Fog(0xbfd2e0, 120, 620);

// Gradient sky dome with a soft sun
{
  const g = new THREE.SphereGeometry(1000, 32, 16);
  const m = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite: false,
    uniforms: { top:{value:skyTop}, bot:{value:skyBot}, sunDir:{value:new THREE.Vector3(0.5,0.6,0.35).normalize()} },
    vertexShader: `varying vec3 vP; void main(){ vP = position; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader: `varying vec3 vP; uniform vec3 top; uniform vec3 bot; uniform vec3 sunDir;
      void main(){ vec3 dir=normalize(vP); float h=dir.y*0.5+0.5;
        vec3 col=mix(bot,top,pow(h,0.8));
        float s=max(0.0,dot(dir,sunDir));
        col += vec3(1.0,0.93,0.75)*pow(s,8.0)*0.5;         // sun haze
        col += vec3(1.0,0.96,0.85)*smoothstep(0.9985,0.9997,s); // sun disc
        gl_FragColor=vec4(col,1.0);}`
  });
  scene.add(new THREE.Mesh(g, m));
}

// ---------- Environment reflections (PMREM from a procedural sky) ----------
// Gives glass, car paint and wet tarmac real reflections instead of flat shading.
{
  const ec = document.createElement('canvas'); ec.width=512; ec.height=256;
  const ex = ec.getContext('2d');
  const grd = ex.createLinearGradient(0,0,0,256);
  grd.addColorStop(0.0,'#8fc0ea'); grd.addColorStop(0.45,'#cfe0ec');
  grd.addColorStop(0.5,'#c7cdd0'); grd.addColorStop(1.0,'#4a4f44'); // horizon → ground
  ex.fillStyle=grd; ex.fillRect(0,0,512,256);
  // sun blob
  const sg=ex.createRadialGradient(360,70,4,360,70,60); sg.addColorStop(0,'rgba(255,250,235,1)'); sg.addColorStop(1,'rgba(255,250,235,0)');
  ex.fillStyle=sg; ex.fillRect(300,10,120,120);
  const envTex=new THREE.CanvasTexture(ec); envTex.mapping=THREE.EquirectangularReflectionMapping; envTex.colorSpace=THREE.SRGBColorSpace;
  const pmrem=new THREE.PMREMGenerator(renderer); pmrem.compileEquirectangularShader();
  scene.environment=pmrem.fromEquirectangular(envTex).texture;
  envTex.dispose(); pmrem.dispose();
}

// ---------- Camera ----------
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.5, 2000);
camera.position.set(0, 12, 22);

// ---------- Lights ----------
const hemi = new THREE.HemisphereLight(0xbfd6ff, 0x505a52, 0.85);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff2d6, 2.1);
sun.position.set(120, 180, 80);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 10; sun.shadow.camera.far = 600;
const S = 260;
sun.shadow.camera.left=-S; sun.shadow.camera.right=S; sun.shadow.camera.top=S; sun.shadow.camera.bottom=-S;
sun.shadow.bias = -0.0004;
sun.shadow.normalBias = 0.5;
scene.add(sun);
scene.add(sun.target);

setLoad(0.1, 'Laying the streets…');

// ============================================================
//  MAYFAIR — a real, to-scale street layout (roughly Park Lane→Regent St,
//  Oxford St→Piccadilly). Streets run at irregular spacing and width, with
//  their real names; buildings between them carry real Mayfair shopfronts.
// ============================================================
const roadY = 0.02;
// vertical streets (run N–S): x centre, carriageway width, name
const vStreets = [
  {c:-250, w:26, name:'PARK LANE', main:true},
  {c:-192, w:13, name:'PARK STREET'},
  {c:-148, w:15, name:'SOUTH AUDLEY ST', main:true},
  {c:-92,  w:14, name:'DAVIES STREET'},
  {c:-34,  w:15, name:'BERKELEY STREET', main:true},
  {c:46,   w:16, name:'NEW BOND STREET', main:true},
  {c:116,  w:13, name:'ALBEMARLE ST'},
  {c:200,  w:26, name:'REGENT STREET', main:true},
];
// horizontal streets (run E–W): z centre, width, name
const hStreets = [
  {c:-232, w:26, name:'OXFORD STREET', main:true},
  {c:-178, w:14, name:'GROSVENOR ST'},
  {c:-138, w:14, name:'BROOK STREET', main:true},
  {c:-78,  w:15, name:'MOUNT STREET', main:true},
  {c:-22,  w:13, name:'HILL STREET'},
  {c:36,   w:16, name:'CURZON STREET', main:true},
  {c:122,  w:26, name:'PICCADILLY', main:true},
];
const vLines = vStreets.map(s=>s.c), hLines = hStreets.map(s=>s.c);
const vByC = {}, hByC = {}; vStreets.forEach(s=>vByC[s.c]=s); hStreets.forEach(s=>hByC[s.c]=s);
const minX=vLines[0], maxX=vLines[vLines.length-1], minZ=hLines[0], maxZ=hLines[hLines.length-1];
const midX=(minX+maxX)/2, midZ=(minZ+maxZ)/2;
const HALF = Math.max(maxX-minX, maxZ-minZ)/2 + 60;   // for ground / bounds / minimap
const worldBounds = { x0:minX-30, x1:maxX+30, z0:minZ-30, z1:maxZ+30 };

// A small deterministic PRNG so the city is stable each load
let seed = 20240607;
function rnd(){ seed = (seed*1664525 + 1013904223) & 0xffffffff; return ((seed>>>0)/4294967296); }

// ---------- Ground (Mayfair pavement) ----------
{
  const g = new THREE.PlaneGeometry((maxX-minX)+300, (maxZ-minZ)+300);
  const m = new THREE.MeshStandardMaterial({ color: 0x5f646c, roughness: 1, envMapIntensity:0.12 }); // paving
  const ground = new THREE.Mesh(g, m);
  ground.rotation.x = -Math.PI/2; ground.position.set(midX,-0.02,midZ);
  ground.receiveShadow = true; scene.add(ground);
}

// ---------- Roads (asphalt) with lane markings ----------
const asphaltBump = (()=>{ const c=document.createElement('canvas'); c.width=c.height=128; const x=c.getContext('2d');
  const im=x.createImageData(128,128); for(let i=0;i<im.data.length;i+=4){ const v=140+Math.random()*70; im.data[i]=im.data[i+1]=im.data[i+2]=v; im.data[i+3]=255; }
  x.putImageData(im,0,0); const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(60,60); return t; })();
const mainMat = new THREE.MeshStandardMaterial({ color: 0x30353b, roughness: 0.72, bumpMap: asphaltBump, bumpScale: 0.06, envMapIntensity: 0.5 });
const sideMat = new THREE.MeshStandardMaterial({ color: 0x3d434b, roughness: 0.8, bumpMap: asphaltBump, bumpScale: 0.06, envMapIntensity: 0.4 });
const lineMat = new THREE.MeshStandardMaterial({ color: 0xe9edf0, roughness: 0.5 });
const yellowMat= new THREE.MeshStandardMaterial({ color: 0xE7B93A, roughness: 0.6 });
const pavementMat = new THREE.MeshStandardMaterial({ color: 0x9aa0a8, roughness: 1 });
const isMain = c => (vByC[c] && vByC[c].main) || (hByC[c] && hByC[c].main);

const roadGroup = new THREE.Group(); scene.add(roadGroup);
const flatXZ = -Math.PI/2;
const spanX = (worldBounds.x1-worldBounds.x0), spanZ = (worldBounds.z1-worldBounds.z0);
function addFlat(geo, mat, x, z, rotY){
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = flatXZ; if(rotY) m.rotation.z = rotY;
  m.position.set(x, roadY+0.012, z); roadGroup.add(m); return m;
}
function markings(len, w, main, vertical){
  // vertical=true → street runs along Z (markings along Z); returns builder using centre coord c
  return (c)=>{
    if(main){ // white centre line
      if(vertical) addFlat(new THREE.PlaneGeometry(0.5,len), lineMat, c, midZ, 0);
      else addFlat(new THREE.PlaneGeometry(len,0.5), lineMat, midX, c, 0);
    } else { // double-yellow near each kerb
      for(const off of [-1,1]){ const e=off*(w/2-1.1);
        if(vertical){ addFlat(new THREE.PlaneGeometry(0.28,len), yellowMat, c+e, midZ,0); addFlat(new THREE.PlaneGeometry(0.28,len), yellowMat, c+e+off*0.5, midZ,0); }
        else { addFlat(new THREE.PlaneGeometry(len,0.28), yellowMat, midX, c+e,0); addFlat(new THREE.PlaneGeometry(len,0.28), yellowMat, midX, c+e+off*0.5,0); }
      }
    }
  };
}
// vertical streets
for(const s of vStreets){
  const vt=new THREE.Mesh(new THREE.PlaneGeometry(s.w, spanZ), s.main?mainMat:sideMat);
  vt.rotation.x=flatXZ; vt.position.set(s.c, roadY, midZ); vt.receiveShadow=true; roadGroup.add(vt);
  markings(spanZ, s.w, s.main, true)(s.c);
}
// horizontal streets
for(const s of hStreets){
  const hz=new THREE.Mesh(new THREE.PlaneGeometry(spanX, s.w), s.main?mainMat:sideMat);
  hz.rotation.x=flatXZ; hz.position.set(midX, roadY, s.c); hz.receiveShadow=true; roadGroup.add(hz);
  markings(spanX, s.w, s.main, false)(s.c);
}

// Zebra crossings + Belisha beacons at the busy junctions
function belisha(x, z){
  const g = new THREE.Group();
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,4.2,8), new THREE.MeshStandardMaterial({color:0x222, roughness:0.6}));
  pole.position.y=2.1; g.add(pole);
  const globe = new THREE.Mesh(new THREE.SphereGeometry(0.5,14,12), new THREE.MeshStandardMaterial({color:0xff8a00, emissive:0xff7a00, emissiveIntensity:1.1}));
  globe.position.y=4.5; g.add(globe);
  g.position.set(x,0,z); roadGroup.add(g);
}
function addZebra(cx, cz, wv, wh){
  const stripeGeo = new THREE.PlaneGeometry(1.1, Math.min(wv,wh)-2);
  for (let s=-3; s<=3; s++){
    addFlat(stripeGeo, lineMat, cx + s*1.9, cz - wh/2 - 3.2, 0);
    addFlat(stripeGeo, lineMat, cx + s*1.9, cz + wh/2 + 3.2, 0);
    addFlat(stripeGeo, lineMat, cx - wv/2 - 3.2, cz + s*1.9, Math.PI/2);
    addFlat(stripeGeo, lineMat, cx + wv/2 + 3.2, cz + s*1.9, Math.PI/2);
  }
  belisha(cx - wv/2 - 2, cz - wh/2 - 2);
  belisha(cx + wv/2 + 2, cz + wh/2 + 2);
}
for(const v of vStreets) for(const h of hStreets){
  if(v.main && h.main && rnd()<0.55) addZebra(v.c, h.c, v.w, h.w);
}

setLoad(0.22, 'Painting the roads…');

setLoad(0.25, 'Raising the buildings…');

// ---------- Buildings ----------
// London palette with material "kind" so each facade renders as real brick,
// stock brick, Portland stone or painted stucco (glass is for the City towers).
const slate = 0x4a4e55, terracotta = 0x9c4a30; // roof tones
const facadePalette = [
  {c:0x9c5a44,k:'brick'},{c:0xb06a4e,k:'brick'},{c:0x8a4d3a,k:'brick'},{c:0xa5674a,k:'brick'},{c:0x8a4d3a,k:'brick'},
  {c:0xbdae8a,k:'stock'},{c:0xc9bd9c,k:'stock'},{c:0xb3a684,k:'stock'},
  {c:0xdcd4c2,k:'stone'},{c:0xe6ded0,k:'stone'},{c:0xcfc7b6,k:'stone'},
  {c:0xece9e0,k:'stucco'},{c:0xf1eee5,k:'stucco'},{c:0xe2e0d8,k:'stucco'},
];
const glassColors = [0x8fa6b4, 0x9db4b0, 0xa7b6c2, 0x7f9aae];

const buildingGeoCache = {};
function boxGeo(w,h,d){ const k=w+'_'+h+'_'+d; return buildingGeoCache[k] || (buildingGeoCache[k]=new THREE.BoxGeometry(w,h,d)); }

const buildingGroup = new THREE.Group(); scene.add(buildingGroup);
const colliders = []; // {x,z,hw,hd} axis-aligned building boxes for collision

// One-storey facade tile: masonry pattern + framed sash windows, repeated up
// and across the wall. kind ∈ brick|stock|stone|stucco|glass.
function makeFacadeTexture(color, kind){
  const W=96, H=64, c=document.createElement('canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  const base=new THREE.Color(color);
  ctx.fillStyle='#'+base.getHexString(); ctx.fillRect(0,0,W,H);
  const darker=(m)=>'#'+base.clone().multiplyScalar(m).getHexString();

  if(kind==='glass'){
    ctx.fillStyle='rgba(20,32,46,0.94)';
    for(let y=4;y<H;y+=10){ for(let x=4;x<W;x+=12){ ctx.fillRect(x,y,10,8);} }
    ctx.fillStyle='rgba(255,255,255,0.06)';
    for(let x=2;x<W;x+=12) ctx.fillRect(x,0,1,H);
    for(let y=4;y<H;y+=10){ for(let x=4;x<W;x+=12){ if(Math.random()<0.1){ctx.fillStyle='rgba(255,222,150,0.5)';ctx.fillRect(x,y,10,8);ctx.fillStyle='rgba(20,32,46,0.94)';}}}
  } else {
    // masonry
    if(kind==='brick'||kind==='stock'){
      ctx.strokeStyle=darker(0.82); ctx.lineWidth=1;
      for(let y=0;y<H;y+=6){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
      for(let y=0;y<H;y+=6){ const off=((y/6)%2)*8; for(let x=off;x<W;x+=16){ ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+6);ctx.stroke(); } }
      // subtle per-brick tone noise
      for(let i=0;i<120;i++){ ctx.fillStyle='rgba(0,0,0,'+(Math.random()*0.05)+')'; ctx.fillRect(Math.random()*W,Math.random()*H,4,3); }
    } else if(kind==='stone'){
      ctx.strokeStyle='rgba(0,0,0,0.10)'; ctx.lineWidth=1;
      for(let y=0;y<H;y+=11){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
      for(let y=0;y<H;y+=11){ const off=((y/11)%2)*16; for(let x=off;x<W;x+=32){ ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+11);ctx.stroke(); } }
    } else { // stucco — smooth with faint horizontal rustication
      ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
      for(let y=0;y<H;y+=13){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
    }
    // framed sash windows, 3 across
    const frame = (kind==='stucco'||kind==='stone') ? '#f4f1e8' : '#efe7d8';
    for(let wx=8; wx<W-8; wx+=32){
      const y=12, ww=18, hh=34;
      ctx.fillStyle=frame; ctx.fillRect(wx-2,y-3,ww+4,hh+5);            // stone surround
      ctx.fillStyle='rgba(18,26,36,0.92)'; ctx.fillRect(wx,y,ww,hh);   // glass
      const lit = Math.random()<0.22;
      if(lit){ ctx.fillStyle='rgba(255,214,140,0.6)'; ctx.fillRect(wx,y,ww,hh); }
      ctx.strokeStyle=frame; ctx.lineWidth=1.4;                         // glazing bars (2 over 2)
      ctx.strokeRect(wx,y,ww,hh);
      ctx.beginPath(); ctx.moveTo(wx+ww/2,y); ctx.lineTo(wx+ww/2,y+hh); ctx.moveTo(wx,y+hh/2); ctx.lineTo(wx+ww,y+hh/2); ctx.stroke();
      ctx.fillStyle=frame; ctx.fillRect(wx-3,y+hh+1,ww+6,2);            // sill
    }
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.anisotropy=4; return t;
}
const facadeTexCache={};
function facadeMat(color, w, h, kind){
  const key=color+'-'+kind;
  if(!facadeTexCache[key]) facadeTexCache[key]=makeFacadeTexture(color, kind);
  const t=facadeTexCache[key].clone(); t.needsUpdate=true;
  const glass=kind==='glass';
  t.repeat.set(Math.max(1,Math.round(w/6.5)), Math.max(1,Math.round(h/(glass?6:3.4))));

  return new THREE.MeshStandardMaterial({ map:t, bumpMap:t, bumpScale: glass?0.12:0.55,
    roughness: glass?0.16:0.92, metalness: glass?0.55:0.02,
    envMapIntensity: glass?1.35:0.45 });
}

// pitched roof (triangular prism) for low-rise terraces + a chimney or two
function addPitchedRoof(parent, bx, bz, w, d, baseY, col){
  const rh = 1.5 + Math.min(w,d)*0.18;
  const geo = new THREE.BufferGeometry();
  const hw=w/2, hd=d/2;
  // ridge runs along X
  const v = new Float32Array([
    -hw,0,-hd,  hw,0,-hd,  hw,0,hd,  -hw,0,hd,      // eaves (0-3)
    -hw,rh,0,   hw,rh,0,                             // ridge (4-5)
  ]);
  const idx=[0,1,5, 0,5,4, 3,2,1, 3,1,0, 2,3,4, 2,4,5, 0,4,3, 1,2,5];
  geo.setAttribute('position', new THREE.BufferAttribute(v,3));
  geo.setIndex(idx); geo.computeVertexNormals();
  const roof = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color:col, roughness:0.9, flatShading:true}));
  roof.position.set(bx, baseY, bz); roof.castShadow=true; parent.add(roof);
  // chimney
  const ch = new THREE.Mesh(boxGeo(1.1, 2.4, 1.1), new THREE.MeshStandardMaterial({color:0x7a5c4a, roughness:1}));
  ch.position.set(bx + (rnd()-0.5)*w*0.5, baseY+1.2, bz + (rnd()<0.5?-1:1)*hd*0.5);
  ch.castShadow=true; parent.add(ch);
}

function shopKindFor(name){
  if(/BOND|ALBEMARLE|REGENT/.test(name)) return 'luxury';
  if(/MOUNT/.test(name)) return 'dining';
  if(/CURZON/.test(name)) return 'curzon';
  if(/PICCADILLY/.test(name)) return 'piccadilly';
  if(/OXFORD/.test(name)) return 'highstreet';
  return null;
}
const shopPri = { luxury:5, dining:4, piccadilly:3, curzon:2, highstreet:1 };

function placeShopRow(cx, cz, side, faceLen, kind){
  const n = Math.max(1, Math.min(6, Math.floor(faceLen/12)));
  const sw = faceLen/n - 1.0;
  for(let i=0;i<n;i++){
    const t = -faceLen/2 + faceLen*(i+0.5)/n;
    const shop = makeShopfront(pickShop(kind), sw, kind);
    if(side==='z0'){ shop.position.set(cx+t, 0, cz-0.15); shop.rotation.y=Math.PI; }
    else if(side==='z1'){ shop.position.set(cx+t, 0, cz+0.15); }
    else if(side==='x0'){ shop.position.set(cx-0.15, 0, cz+t); shop.rotation.y=-Math.PI/2; }
    else { shop.position.set(cx+0.15, 0, cz+t); shop.rotation.y=Math.PI/2; }
    buildingGroup.add(shop);
  }
}

    }
  }
}

// leafy Mayfair-style garden square with iron railings and a central statue
function addSquare(x,z,name,sw,sd){
  const g = new THREE.Group();
  const S = Math.min(sw||46, sd||46);
  const grass = new THREE.Mesh(new THREE.PlaneGeometry(S,S), new THREE.MeshStandardMaterial({color:0x4d7a38, roughness:1}));
  grass.rotation.x=-Math.PI/2; grass.position.y=0.03; grass.receiveShadow=true; g.add(grass);
  // gravel cross paths
  const pathMat=new THREE.MeshStandardMaterial({color:0xb7ac93, roughness:1});
  const p1=new THREE.Mesh(new THREE.PlaneGeometry(S,3),pathMat); p1.rotation.x=-Math.PI/2; p1.position.y=0.04; g.add(p1);
  const p2=new THREE.Mesh(new THREE.PlaneGeometry(3,S),pathMat); p2.rotation.x=-Math.PI/2; p2.position.y=0.04; g.add(p2);
  // perimeter railings on all four sides
  const half=S/2;
  for(const s of [[0,half,0],[0,-half,0],[half,0,Math.PI/2],[-half,0,Math.PI/2]]){
    const r=makeRailings(S); r.position.set(s[0],0,s[1]); if(s[2]) r.rotation.y=s[2]; g.add(r);
  }
  // ring of plane trees
  for(let k=0;k<16;k++){ const a=k/16*Math.PI*2, rr=half-4; g.add(makeTree(Math.cos(a)*rr, Math.sin(a)*rr)); }
  // central statue on a plinth
  const plinth=new THREE.Mesh(new THREE.CylinderGeometry(1.2,1.5,2,12), new THREE.MeshStandardMaterial({color:0xcfc7b6, roughness:0.9})); plinth.position.y=1; plinth.castShadow=true; g.add(plinth);
  const statue=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,3,8), new THREE.MeshStandardMaterial({color:0x4b5a52, metalness:0.4, roughness:0.6})); statue.position.y=3.5; statue.castShadow=true; g.add(statue);
  g.position.set(x,0,z); scene.add(g);
  landmarks.push({name, x, z, r:34});
}

// Front of the car is local -Z (direction of travel). The chase camera sits
// behind at +Z, so the REAR (boot, tail-light bar, yellow plate) faces it.
function makeCar(bodyColor=0x0b0b0d, taxi=false, detailed=false){
  const car = new THREE.Group();
  // glossy clear-coat paint for the player's hero car; simpler paint for traffic
  const paint = detailed
    ? new THREE.MeshPhysicalMaterial({color:bodyColor, roughness:0.24, metalness:0.55, clearcoat:0.9, clearcoatRoughness:0.18, envMapIntensity:1.5})
    : new THREE.MeshStandardMaterial({color:bodyColor, roughness:0.32, metalness:0.5, envMapIntensity:1.1});
  if(taxi){ paint.emissive = new THREE.Color(bodyColor).multiplyScalar(0.4); paint.emissiveIntensity = 0.5; }
  const glass = new THREE.MeshStandardMaterial({color:0x0e151d, roughness:0.05, metalness:0.6, envMapIntensity:1.4, transparent:true, opacity:0.7});
  const trim  = new THREE.MeshStandardMaterial({color:0x14171b, roughness:0.5, metalness:0.5, envMapIntensity:1.0});
  const chrome= new THREE.MeshStandardMaterial({color:0xdfe4e9, metalness:1.0, roughness:0.15, envMapIntensity:1.6});
  const hlMat = new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xfff2c0, emissiveIntensity:1.5});
  const tlMat = new THREE.MeshStandardMaterial({color:0xff2a22, emissive:0xff1710, emissiveIntensity:1.3});
  const box=(w,h,d,mat)=>{ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat); m.castShadow=true; return m; };
  const add=(m,x,y,z,rx)=>{ m.position.set(x,y,z); if(rx) m.rotation.x=rx; car.add(m); return m; };

  // main body + lower sills / wheel-arch band
  add(box(2.14,0.86,4.5,paint), 0,0.9,0);
  add(box(2.24,0.42,4.2,trim), 0,0.5,0);
  // bonnet (front, -Z) and boot deck (rear, +Z) — different lengths so ends differ
  add(box(2.0,0.4,1.5,paint), 0,1.2,-1.45);
  add(box(2.0,0.44,1.0,paint), 0,1.24,1.7);
  // cabin greenhouse
  add(box(1.96,0.86,2.5,paint), 0,1.72,0.15);

  if(detailed){
    // raked wind-screens
    add(box(1.86,0.82,0.08,glass), 0,1.68,-1.02, -0.5);
    add(box(1.86,0.78,0.08,glass), 0,1.68, 1.28,  0.5);
    // side glass
    const sl=box(0.08,0.62,2.2,glass); add(sl,0.99,1.78,0.15); const sr=sl.clone(); add(sr,-0.99,1.78,0.15);
    // door line + handles
    add(box(2.16,0.02,2.6,trim), 0,1.28,0.1);
    // front: grille + bumper + splitter
    add(box(1.5,0.38,0.1,trim), 0,1.02,-2.28);
    add(box(2.16,0.34,0.42,trim), 0,0.66,-2.32);
    add(box(1.2,0.12,0.2,chrome), 0,1.18,-2.3);          // chrome strip
    // rear: full-width tail-light bar + boot handle + bumper + exhaust
    add(box(2.02,0.3,0.12,tlMat), 0,1.06,2.32);          // wraparound red bar
    add(box(0.8,0.06,0.06,chrome), 0,1.3,2.28);          // boot chrome
    add(box(2.16,0.34,0.42,trim), 0,0.66,2.34);          // rear bumper
    const exh=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,0.3,8),chrome); exh.rotation.x=Math.PI/2; add(exh,-0.6,0.5,2.5);
    // wing mirrors
    add(box(0.34,0.2,0.16,paint), 1.16,1.6,-0.7); add(box(0.34,0.2,0.16,paint),-1.16,1.6,-0.7);
    // UK number plates: white front, yellow rear (also flags which end is the rear)
    add(box(0.86,0.26,0.05,new THREE.MeshStandardMaterial({color:0xf2f2f2, roughness:0.5})), 0,0.66,-2.36);
    add(box(0.86,0.26,0.05,new THREE.MeshStandardMaterial({color:0xf6d21f, roughness:0.5})), 0,0.66,2.38);
  }
  // headlights (front) + tail lights (rear)
  for(const sx of [-0.72,0.72]){
    add(box(0.46,0.26,0.12,hlMat), sx,1.0,-2.28);
    if(!detailed) add(box(0.4,0.28,0.12,tlMat), sx,1.05,2.3);
  }

  // wheels — front pair first (so steering visual uses indices 0,1); front at -Z
  const wheelGeo = new THREE.CylinderGeometry(0.56,0.56,0.42,18);
  const wheelMat = new THREE.MeshStandardMaterial({color:0x0b0b0b, roughness:0.9});
  const hubMat = chrome;
  const wheels=[];
  [[1.04,0.56,-1.5],[-1.04,0.56,-1.5],[1.04,0.56,1.5],[-1.04,0.56,1.5]].forEach(p=>{
    const w=new THREE.Group();
    const tire=new THREE.Mesh(wheelGeo, wheelMat); tire.rotation.z=Math.PI/2; tire.castShadow=true; w.add(tire);
    const hub=new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.24,0.44,6), hubMat); hub.rotation.z=Math.PI/2; w.add(hub);
    w.position.set(...p); car.add(w); wheels.push(w);
  });

  // white roof band + taxi light for the player's cab
  if(taxi){
    add(box(1.98,0.16,2.5,new THREE.MeshStandardMaterial({color:0xf3f5f7, roughness:0.5})), 0,2.2,0.15);
    add(box(0.95,0.3,0.4,new THREE.MeshStandardMaterial({color:0xffd23f, emissive:0xffb800, emissiveIntensity:0.9})), 0,2.44,0.15);
  }
  return { car, wheels, paint };
}

  const body = new THREE.Mesh(new THREE.BoxGeometry(2.6, 3.6, 8.2), red); body.position.y=2.2; body.castShadow=true; g.add(body);
  // window strips
  for(const y of [1.6,3.1]){ const w=new THREE.Mesh(new THREE.BoxGeometry(2.62,0.7,7.4), glass); w.position.set(0,y,0); g.add(w);}
  // wheels
  const wm=new THREE.MeshStandardMaterial({color:0x0a0a0a, roughness:0.9});
  [[1.3,0.6,2.6],[-1.3,0.6,2.6],[1.3,0.6,-2.6],[-1.3,0.6,-2.6]].forEach(p=>{const w=new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.7,0.4,12),wm);w.rotation.z=Math.PI/2;w.position.set(...p);w.castShadow=true;g.add(w);});
  return g;
}
const carColors=[0xffffff,0x1a1a1a,0x8a1220,0x14315e,0x8f9296,0x2f6d3a,0xd9b23a];
function makeTrafficCar(){ const {car}=makeCar(carColors[(Math.random()*carColors.length)|0], false); return car; }

// assign an agent a random street + lane
function assignStreet(a){
  a.horizontal = Math.random()<0.5;                 // horizontal → drives along X on an hStreet
  const s = a.horizontal ? hStreets[(Math.random()*hStreets.length)|0] : vStreets[(Math.random()*vStreets.length)|0];
  a.line = s.c; a.w = s.w;
  a.dir = Math.random()<0.5?1:-1;
  a.laneOff = (a.dir>0 ? 1 : -1) * Math.max(3, a.w/4);
}
function spawnAgent(isBus){
  const mesh = isBus ? makeBus() : makeTrafficCar();
  scene.add(mesh);
  const a = { mesh, isBus, speed: isBus ? 8+Math.random()*3 : 12+Math.random()*10, hit:0 };
  assignStreet(a);
  const lo = a.horizontal ? worldBounds.x0 : worldBounds.z0, hi = a.horizontal ? worldBounds.x1 : worldBounds.z1;
  a.pos = lo + Math.random()*(hi-lo);
  traffic.push(a);
  updateAgent(a, 0, true);
}
function respawnAgent(a){
  assignStreet(a);
  const lo = a.horizontal ? worldBounds.x0 : worldBounds.z0, hi = a.horizontal ? worldBounds.x1 : worldBounds.z1;
  a.pos = a.dir>0 ? lo-15 : hi+15;
  a.hit = 0;
}
function updateAgent(a, dt, init){
  if (a.hit > 0){
    // knocked flying — free physics, spin, tumble, then recycle
    a.hit -= dt;
    a.mesh.position.x += a.vx*dt; a.mesh.position.z += a.vz*dt;
    a.mesh.position.y = Math.max(0, a.mesh.position.y + a.vy*dt); a.vy -= 9*dt;
    if(a.mesh.position.y<=0){ a.vy = a.vy<-2 ? -a.vy*0.35 : 0; a.vx*=0.7; a.vz*=0.7; }
    a.mesh.rotation.y += a.vspin*dt; a.mesh.rotation.z += a.vroll*dt;
    if (a.hit<=0){ a.mesh.rotation.set(0,0,0); a.mesh.position.y=0; respawnAgent(a); }
    return;
  }
  a.pos += a.dir * a.speed * dt;
  const lo = a.horizontal ? worldBounds.x0 : worldBounds.z0, hi = a.horizontal ? worldBounds.x1 : worldBounds.z1;
  if (a.pos > hi+20) a.pos = lo-20;
  if (a.pos < lo-20) a.pos = hi+20;
  // vehicle front is local -Z, so headings are offset accordingly
  if (a.horizontal){
    a.mesh.position.set(a.pos, 0, a.line + a.laneOff);
    a.mesh.rotation.y = a.dir>0 ? -Math.PI/2 : Math.PI/2;
  } else {
    a.mesh.position.set(a.line + a.laneOff, 0, a.pos);
    a.mesh.rotation.y = a.dir>0 ? Math.PI : 0;
  }
}
// player rams a traffic car → knock it flying and take some damage
function checkTrafficHits(){
  const ps = Math.abs(vehicle.speed);
  for(const a of traffic){
    if(a.hit>0) continue;
    const dx = a.mesh.position.x - player.position.x;
    const dz = a.mesh.position.z - player.position.z;
    const near = a.isBus ? 4.6 : 3.4;
    if(dx*dx+dz*dz < near*near){
      const d = Math.hypot(dx,dz)||1;
      const force = 8 + ps*0.9;
      a.hit = 1.4 + Math.random()*0.6;
      a.vx = (dx/d)*force; a.vz = (dz/d)*force;
      // carry the player's travel direction into the knock
      const fwd = new THREE.Vector3(-Math.sin(player.rotation.y),0,-Math.cos(player.rotation.y));
      a.vx += fwd.x*ps*0.8; a.vz += fwd.z*ps*0.8;
      a.vy = 3 + ps*0.25; a.vspin = (Math.random()-0.5)*6; a.vroll = (Math.random()-0.5)*5;
      if(a.isBus){ a.vx*=0.4; a.vz*=0.4; a.vy*=0.4; } // buses barely budge
      const impact = Math.min(1, ps*0.03 + 0.15) * (a.isBus?1.8:1);
      addDamage((a.isBus?18:9) + ps*0.3, impact);
      vehicle.speed *= a.isBus ? 0.5 : 0.82; // plough through, lose a little speed
    }
  }
}

// ---------- audio (horn) via WebAudio ----------
let actx;
function horn(){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='square'; o.frequency.value=280; g.gain.value=0.06;
    o.connect(g); g.connect(actx.destination); o.start();
    g.gain.setValueAtTime(0.06, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.5);
    o.stop(actx.currentTime+0.5);
  }catch(e){}
}
// crash/crunch — a short burst of filtered noise
function crunch(vol){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const n = actx.sampleRate*0.25, buf = actx.createBuffer(1, n, actx.sampleRate), data = buf.getChannelData(0);
    for(let i=0;i<n;i++){ data[i] = (Math.random()*2-1) * (1-i/n); }
    const src = actx.createBufferSource(); src.buffer = buf;
    const g = actx.createGain(); g.gain.value = 0.28*vol;
    const f = actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 900 + 1400*vol;
    src.connect(f); f.connect(g); g.connect(actx.destination); src.start();
    g.gain.setValueAtTime(0.28*vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.25);
  }catch(e){}
}

const smokeTex = (()=>{ const c=document.createElement('canvas'); c.width=c.height=64; const x=c.getContext('2d');
  const gr=x.createRadialGradient(32,32,2,32,32,30); gr.addColorStop(0,'rgba(80,80,84,0.9)'); gr.addColorStop(1,'rgba(80,80,84,0)');
  x.fillStyle=gr; x.fillRect(0,0,64,64); return new THREE.CanvasTexture(c); })();
const smokePool=[]; let smokeI=0;
for(let i=0;i<16;i++){

  s.scale.set(2,2,2); s.visible=false; scene.add(s); smokePool.push({s, life:0, vy:0});
}
let smokeTimer=0;
function emitSmoke(x,y,z){
  const p=smokePool[smokeI=(smokeI+1)%smokePool.length];
  p.s.position.set(x+(Math.random()-0.5), y, z+(Math.random()-0.5));
  p.s.material.opacity=0.6; p.s.visible=true; p.life=1; p.vy=1.4+Math.random();
}
function updateSmoke(dt){
  for(const p of smokePool){ if(p.life<=0) continue;
    p.life-=dt*0.7; p.s.position.y+=p.vy*dt; const sc=2+(1-p.life)*3; p.s.scale.set(sc,sc,sc);
    p.s.material.opacity=Math.max(0,p.life*0.6);
    if(p.life<=0) p.s.visible=false;
  }
}

const vehicle = {

  heading: 0,        // radians, 0 = +Z? we use rotation.y

// ----- damage / impact state -----
let damage = 0;      // 0 (mint) .. 100 (wreck)
let shake = 0;       // camera shake amount, decays
let jolt = 0;        // body pitch/roll jolt on impact
function addDamage(amount, impact){
  damage = Math.min(100, damage + amount);
  shake = Math.min(1.2, shake + impact);
  jolt = Math.min(0.5, jolt + impact*0.3);
  crunch(Math.min(1, impact));
  updateWreck();
}
function resetCar(){
  player.position.set(START.x, 0, START.z);
  player.rotation.set(0, START.ry, 0);
  vehicle.speed = 0; vehicle.heading = START.ry;
  damage = 0; shake = 0; jolt = 0; updateWreck();
  showPlace('Repaired');
}
// visual wreck: darken paint and lean the car as damage rises
function updateWreck(){
  const g = 1 - damage/160;
  playerPaint.color.setRGB(0.886*g+0.05, 0.231*g+0.03, 0.180*g+0.03);
  playerPaint.emissiveIntensity = Math.max(0.05, 0.5*(1-damage/100));
}

// collision: buildings block (with a crash), the world edge clamps
function resolveCollision(px, pz){
  for(const c of colliders){
    const dx = px - c.x, dz = pz - c.z;
    const ox = (c.hw + 1.2) - Math.abs(dx);
    const oz = (c.hd + 1.2) - Math.abs(dz);
    if(ox>0 && oz>0){
      const impact = Math.abs(vehicle.speed);
      if(impact > 6) addDamage(impact*0.35, impact*0.03);
      if(ox < oz){ px = c.x + Math.sign(dx||1)*(c.hw+1.2); }
      else { pz = c.z + Math.sign(dz||1)*(c.hd+1.2); }
      vehicle.speed *= 0.35;
    }
  }
  px = Math.max(worldBounds.x0-10, Math.min(worldBounds.x1+10, px));
  pz = Math.max(worldBounds.z0-10, Math.min(worldBounds.z1+10, pz));
  return [px,pz];
}

let camMode = 0; // 0 chase, 1 far, 2 hood, 3 top
const camModes = ['Chase','Cinematic','Bonnet','Bird'];
function cycleCam(){ camMode=(camMode+1)%camModes.length; showPlace('Camera: '+camModes[camMode]); }
const camTarget = new THREE.Vector3();
const camPos = new THREE.Vector3();

function updateCamera(dt){
  const back = new THREE.Vector3(Math.sin(player.rotation.y), 0, Math.cos(player.rotation.y));
  let desired = new THREE.Vector3(), look = new THREE.Vector3();
  const p = player.position;
  if(camMode===0){ desired.set(p.x + back.x*11, p.y+5.5, p.z + back.z*11); look.set(p.x - back.x*6, p.y+1.5, p.z - back.z*6); }
  else if(camMode===1){ desired.set(p.x + back.x*20, p.y+9, p.z + back.z*20); look.set(p.x, p.y+1, p.z); }
  else if(camMode===2){ desired.set(p.x - back.x*0.2, p.y+2.4, p.z - back.z*0.2); look.set(p.x - back.x*10, p.y+1.8, p.z - back.z*10); }
  else { desired.set(p.x, p.y+55, p.z+0.1); look.set(p.x, p.y, p.z); }
  const lerp = camMode===2 ? 1 : 1-Math.pow(0.0015, dt);
  camera.position.lerp(desired, lerp);
  camTarget.lerp(look, lerp);
  // crash shake
  if(shake>0.001){
    const t=performance.now()*0.06, s=shake*0.9;
    camera.position.x += Math.sin(t*1.7)*s; camera.position.y += Math.sin(t*2.3)*s*0.7; camera.position.z += Math.cos(t*1.9)*s;
  }
  camera.lookAt(camTarget);
}

  }
  for(const s of vStreets){

  }

  mmx.fillStyle='#e63946'; mmx.beginPath(); mmx.moveTo(0,-8); mmx.lineTo(6,7); mmx.lineTo(0,3); mmx.lineTo(-6,7); mmx.closePath(); mmx.fill();

// ============================================================
//  MAIN LOOP
// ============================================================
let last=performance.now();
let started=false;
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  update(dt);
  renderer.render(scene,camera);
  requestAnimationFrame(frame);
}

function update(dt){
  // ----- input -----
  const gas   = keys['KeyW']||keys['ArrowUp']||touch.gas;
  const brake = keys['KeyS']||keys['ArrowDown']||touch.brake;
  const left  = keys['KeyA']||keys['ArrowLeft']||touch.left;
  const right = keys['KeyD']||keys['ArrowRight']||touch.right;
  const hand  = keys['Space'];

  // ----- longitudinal -----
  if(gas){ vehicle.speed += vehicle.accel*dt; }
  else if(brake){
    if(vehicle.speed>0.2) vehicle.speed -= vehicle.brakeForce*dt;
    else vehicle.speed -= vehicle.accel*0.7*dt;
  } else {
    // engine braking / friction
    if(vehicle.speed>0) vehicle.speed=Math.max(0,vehicle.speed-vehicle.friction*dt);
    else if(vehicle.speed<0) vehicle.speed=Math.min(0,vehicle.speed+vehicle.friction*dt);
  }
  if(hand){ vehicle.speed *= (1-2.5*dt); }
  vehicle.speed=Math.max(vehicle.reverseMax, Math.min(vehicle.maxSpeed, vehicle.speed));

  // ----- steering (speed-sensitive) -----
  const speedFactor = Math.min(1, Math.abs(vehicle.speed)/vehicle.maxSpeed);
  const steerRate = 1.9 * (0.35 + 0.65*(1-speedFactor*0.4));
  let steerInput = (left?1:0) - (right?1:0);
  vehicle.steer += ((steerInput) - vehicle.steer)*Math.min(1,dt*8);
  const grip = hand ? 0.3 : 1;
  if(Math.abs(vehicle.speed)>0.3){
    player.rotation.y += vehicle.steer * steerRate * dt * Math.sign(vehicle.speed) * grip;
  }

  // ----- integrate position -----
  const fwd = new THREE.Vector3(Math.sin(player.rotation.y),0,Math.cos(player.rotation.y));
  let nx = player.position.x - fwd.x*vehicle.speed*dt; // note: car faces -Z convention
  let nz = player.position.z - fwd.z*vehicle.speed*dt;
  [nx,nz]=resolveCollision(nx,nz);
  player.position.x=nx; player.position.z=nz;

  // slight body roll & wheel spin (+ crash jolt)
  const rollTarget = -vehicle.steer*0.06*speedFactor;
  player.rotation.z += (rollTarget - player.rotation.z)*Math.min(1,dt*6);
  jolt = Math.max(0, jolt - dt*2.2);
  player.rotation.x = jolt * (Math.sin(performance.now()*0.05));
  const spin = vehicle.speed*dt/0.55;
  playerWheels.forEach((w,i)=>{ w.children[0].rotation.x += spin; w.children[1].rotation.x += spin;
    if(i<2){ w.rotation.y = vehicle.steer*0.4; } });

  // ----- collisions with traffic (ram them) + damage smoke -----
  checkTrafficHits();
  shake = Math.max(0, shake - dt*2.5);
  smokeTimer -= dt;
  if(damage > 55 && smokeTimer <= 0){
    const f = new THREE.Vector3(-Math.sin(player.rotation.y),0,-Math.cos(player.rotation.y));
    emitSmoke(player.position.x + f.x*2, 1.4, player.position.z + f.z*2);
    smokeTimer = damage>85 ? 0.10 : 0.22;
  }
  updateSmoke(dt);

  // ----- traffic & peds -----
  for(const a of traffic) updateAgent(a, dt);
  for(const p of peds){
    p.pos += p.dir*p.speed*dt;
    const plo = p.horizontal ? worldBounds.x0 : worldBounds.z0, phi = p.horizontal ? worldBounds.x1 : worldBounds.z1;
    if(p.pos>phi){p.pos=plo;} if(p.pos<plo){p.pos=phi;}
    p.phase+=dt*6;
    const bob=Math.abs(Math.sin(p.phase))*0.08;
    if(p.horizontal){ p.mesh.position.set(p.pos,bob,p.line+p.side); p.mesh.rotation.y=p.dir>0?Math.PI/2:-Math.PI/2;}
    else { p.mesh.position.set(p.line+p.side,bob,p.pos); p.mesh.rotation.y=p.dir>0?0:Math.PI;}
  }

  // ----- camera & sun follow -----
  updateCamera(dt);
  sun.position.set(player.position.x+120, 180, player.position.z+80);
  sun.target.position.copy(player.position);

  // ----- HUD -----
  const mph=Math.round(Math.abs(vehicle.speed)*2.1);
  spdEl.textContent=mph;
  gearEl.textContent = vehicle.speed<-0.3 ? 'R' : 'D';
  dfillEl.style.transform = 'scaleX('+(1-damage/100).toFixed(3)+')';
  // landmark proximity
  let near=null,nd=1e9;
  for(const l of landmarks){ const d=Math.hypot(l.x-player.position.x,l.z-player.position.z); if(d<l.r && d<nd){nd=d;near=l;} }
  if(near && near!==lastLandmark){ showPlace('▸ '+near.name); lastLandmark=near; }
  if(!near) lastLandmark=null;
  if(placeTimer>0){ placeTimer-=dt; if(placeTimer<=0) placeEl.classList.remove('show'); }

  drawMinimap();
}
